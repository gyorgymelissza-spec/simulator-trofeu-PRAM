<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator Examen Trofeu PRAM</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; padding-bottom: 50px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { margin-top: 0; text-align: center; color: #0056b3; }
        
        .btn-optiune { display: block; width: 100%; background-color: #e9ecef; border: 2px solid transparent; padding: 15px; margin-bottom: 10px; border-radius: 5px; font-size: 16px; cursor: pointer; transition: all 0.2s; text-align: left; }
        .btn-optiune:hover:not(:disabled) { background-color: #d3d9df; }
        
        /* Culoarea pentru când selectezi o opțiune înainte de a confirma */
        .btn-selectat { background-color: #cce5ff !important; border: 2px solid #007bff !important; color: #004085; font-weight: bold;}

        .btn-start { text-align: center; display: block; width: 100%; background-color: #007bff; color: white; font-weight: bold; font-size: 18px; padding: 20px; border:none; border-radius:5px; cursor:pointer; box-shadow: 0 4px 6px rgba(0,123,255,0.3); margin-top:20px;}
        .btn-start:hover { background-color: #0056b3; }

        .btn-secundar { text-align: center; display: block; width: 100%; background-color: #6c757d; color: white; font-weight: bold; padding: 15px; border:none; border-radius:5px; cursor:pointer; margin-top: 10px;}
        .btn-secundar:hover { background-color: #5a6268; }

        /* Butonul de confirmare a răspunsului */
        .btn-confirma { background-color: #ff9900; color: white; font-weight: bold; border: none; border-radius: 5px; padding: 15px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 15px; display: none; }
        .btn-confirma:hover { background-color: #e68a00; }

        /* Butoane noi pentru modul de învățare și amânare */
        .btn-cat { background-color: #17a2b8; color: white; border: none; padding: 15px; margin: 5px 0; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; text-align: left;}
        .btn-cat:hover { background-color: #138496; }
        
        .btn-amana { background-color: #6c757d; color: white; font-weight: bold; border: none; border-radius: 5px; padding: 15px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px; display: none; }
        .btn-amana:hover { background-color: #5a6268; }

        .btn-istoric { text-align: center; display: block; width: 100%; background-color: #f8f9fa; border: 1px solid #ced4da; color: #495057; font-weight: bold; padding: 15px; border-radius:5px; cursor:pointer; margin-bottom: 8px;}
        .btn-istoric:hover { background-color: #e2e6ea; }

        .btn-corect { background-color: #28a745 !important; border-color: #1e7e34 !important; color: white !important; }
        .btn-gresit { background-color: #dc3545 !important; border-color: #bd2130 !important; color: white !important; }
        .btn-partial { background-color: #ffcc00 !important; border-color: #e6b800 !important; color: #333 !important; font-weight: bold; }
        
        #quiz-container, #rezultate { display: none; } 
        
        .greseala-box { background-color: #fff0f0; border-left: 4px solid #ff4d4d; padding: 10px; margin-bottom: 15px; border-radius: 5px;}
        .corect-text { color: #28a745; font-weight: bold; }
        .gresit-text { color: #dc3545; font-weight: bold; }
        .progres { text-align: center; color: #6c757d; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .categorie-curenta { text-align: center; color: #ff9900; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .puncte-info { background-color: #e2e3e5; color: #383d41; display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .info-examen { background-color: #e9f7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #bce4ff;}
        
        #istoric-container { margin-top: 30px; border-top: 2px dashed #dee2e6; padding-top: 20px;}
        .invatare-container { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #bce4ff; }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <h2>Simulator Trofeu PRAM</h2>
            <div class="info-examen">
                <p style="margin-top:0;"><strong>Structură examen (45 de întrebări):</strong></p>
                <ul style="margin-bottom:0;">
                    <li>2 întrebări - PSI</li>
                    <li>2 întrebări - Legislație</li>
                    <li>2 întrebări - Protecția Muncii</li>
                    <li>39 întrebări - Profesional</li>
                </ul>
                <hr style="border: 0; border-top: 1px solid #bce4ff; margin: 15px 0;">
                <p style="margin:0; text-align: center; color: #0056b3;"><strong>Atenție: Întrebările pot avea unul sau mai multe răspunsuri corecte!</strong></p>
            </div>
            <button class="btn-start" onclick="pornesteChestionarNou()">Generează un Examen Nou</button>
            
            <div class="invatare-container">
                <h3 style="text-align:center; color:#0056b3; margin-top:0;">Mediu de învățare</h3>
                <p style="text-align:center; font-size:14px; color:#555; margin-bottom: 15px;">
                <div id="categorii-invatare"></div>
            </div>

            <div id="istoric-container"></div> 
        </div>

        <div id="quiz-container">
            <div id="progres-text" class="progres"></div>
            <div id="categorie-text" class="categorie-curenta"></div> 
            
            <h3 id="titlu-intrebare" style="margin-top:0; margin-bottom: 5px;">Se încarcă...</h3>
            <div id="puncte-intrebare"></div>

            <div id="optiuni-container" style="margin-top: 15px;"></div>
            
            <button id="btn-confirma" class="btn-confirma" onclick="verificaRaspuns()">Confirmă Răspunsul</button>
            <button id="btn-mai-tarziu" class="btn-amana" onclick="raspundeMaiTarziu()">Răspunde mai târziu ⏭️</button>
        </div>

        <div id="rezultate"></div>
    </div>

    <script src="intrebari.js"></script>

    <script>
        let chestionarCurent = []; 
        let indexIntrebare = 0;
        let scorAcumulat = 0; 
        let scorMaximPosibil = 0; 
        let raspunsuriGresite = [];
        let optiuniSelectateAcum = [];
        
        let modCurent = 'examen'; // poate fi 'examen' sau 'invatare'
        let categorieCurenta = '';

        window.onload = () => {
            incarcaIstoricPeEcran();
            genereazaButoaneInvatare();
        };

        // --- MEDIUL DE ÎNVĂȚARE ---
        function genereazaButoaneInvatare() {
            const container = document.getElementById("categorii-invatare");
            container.innerHTML = "";
            
            if (typeof bazaDeDate === 'undefined') {
                container.innerHTML = "<p>Baza de date nu s-a încărcat corect.</p>";
                return;
            }

            for (const categorie in bazaDeDate) {
                let total = bazaDeDate[categorie].length;
                let salvat = parseInt(localStorage.getItem('invatare_' + categorie)) || 0;
                if (salvat >= total) salvat = total; // in caz ca a terminat-o anterior
                
                let btn = document.createElement("button");
                btn.className = "btn-cat";
                
                let textProgres = salvat > 0 && salvat < total ? `(Continuă de la ${salvat + 1}/${total})` : `(${total} întrebări)`;
                if (salvat === total) textProgres = `(Completat ✔️)`;

                btn.innerHTML = `📚 Învață: ${categorie} <span style="float:right; font-weight:normal;">${textProgres}</span>`;
                btn.onclick = () => pornesteInvatare(categorie);
                container.appendChild(btn);
            }
        }

        function pornesteInvatare(categorie) {
            modCurent = 'invatare';
            categorieCurenta = categorie;
            
            let intrebari = [...bazaDeDate[categorie]];
            // Seteaza atributul sursa ca sa apara corect la rezultate
            intrebari.forEach(i => i.sursa = categorie); 
            chestionarCurent = intrebari;
            
            let savedIndex = parseInt(localStorage.getItem('invatare_' + categorie)) || 0;
            indexIntrebare = savedIndex;
            
            if (indexIntrebare >= chestionarCurent.length) {
                indexIntrebare = 0; // O ia de la capăt dacă a terminat-o deja
            }
            
            scorAcumulat = 0;
            scorMaximPosibil = chestionarCurent.reduce((t, i) => t + (i.puncte || 1), 0);
            raspunsuriGresite = [];
            
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("rezultate").style.display = "none";
            document.getElementById("quiz-container").style.display = "block";
            
            incarcaIntrebare();
        }

        // --- SISTEMUL DE ISTORIC ---
        function incarcaIstoricPeEcran() {
            const container = document.getElementById("istoric-container");
            container.innerHTML = "";
            let istoricSalvat = JSON.parse(localStorage.getItem("istoricExamene")) || [];
            if (istoricSalvat.length > 0) {
                container.innerHTML = `<h3 style="text-align:center; color:#495057;">Repetă un examen anterior:</h3>`;
                istoricSalvat.forEach((examen) => {
                    let btn = document.createElement("button");
                    btn.className = "btn-istoric";
                    let scor = examen.scorObtinut !== undefined ? examen.scorObtinut : 0;
                    btn.innerHTML = `📝 Examen din <strong>${examen.data}</strong> (Scor: ${scor} / ${examen.scorMaxim} pct)`;
                    btn.onclick = () => pornesteChestionarSalvat(examen.intrebari, examen.scorMaxim);
                    container.appendChild(btn);
                });
            }
        }

        function salveazaExamenInIstoric(intrebari, plafonPuncte, scorReal = null) {
            let istoricSalvat = JSON.parse(localStorage.getItem("istoricExamene")) || [];
            let dataCurenta = new Date().toLocaleString("ro-RO");
            let scorAfisat = scorReal !== null ? scorReal : 0;
            istoricSalvat.unshift({ 
                data: dataCurenta, 
                scorMaxim: plafonPuncte, 
                scorObtinut: scorAfisat,
                intrebari: intrebari 
            });
            if (istoricSalvat.length > 5) istoricSalvat.pop(); 
            localStorage.setItem("istoricExamene", JSON.stringify(istoricSalvat));
        }

        function trageIntrebari(numeCategorie, numarCerut) {
            let intrebariCategorie = [...bazaDeDate[numeCategorie]];
            intrebariCategorie.sort(() => Math.random() - 0.5);
            let extrase = intrebariCategorie.slice(0, numarCerut);
            extrase.forEach(intrebare => intrebare.sursa = numeCategorie);
            return extrase;
        }

        function verificaStocIntrebari() {
            let erori = [];
            if (!bazaDeDate["PSI"] || bazaDeDate["PSI"].length < 2) erori.push("PSI (minim 2)");
            if (!bazaDeDate["LEGISLATIE"] || bazaDeDate["LEGISLATIE"].length < 2) erori.push("LEGISLATIE (minim 2)");
            if (!bazaDeDate["PROTECTIA MUNCII"] || bazaDeDate["PROTECTIA MUNCII"].length < 2) erori.push("PROTECTIA MUNCII (minim 2)");
            if (!bazaDeDate["PROFESIONAL"] || bazaDeDate["PROFESIONAL"].length < 39) erori.push("PROFESIONAL (minim 39)");
            
            if (erori.length > 0) {
                alert("Nu poți genera testul! Baza de date nu are destule întrebări la:\n" + erori.join("\n"));
                return false;
            }
            return true;
        }

        function pornesteChestionarNou() {
            if (!verificaStocIntrebari()) return; 
            modCurent = 'examen';
            let generareReusita = false;
            let incercari = 0;
            let mixTest = [];
            let totalPuncte = 0;

            while (!generareReusita && incercari < 2000) {
                incercari++;
                let psi = trageIntrebari("PSI", 2);
                let legislatie = trageIntrebari("LEGISLATIE", 2);
                let pm = trageIntrebari("PROTECTIA MUNCII", 2);
                let prof = trageIntrebari("PROFESIONAL", 39);

                mixTest = [...psi, ...legislatie, ...pm, ...prof];
                totalPuncte = mixTest.reduce((total, int) => total + (int.puncte || 1), 0);

                if (Math.round(totalPuncte) === 150) generareReusita = true;
            }

            if (!generareReusita) {
                alert(`Eroare! Programul a încercat de 2000 ori, dar testele extrase adună sub 150 de puncte. Reajustează punctajele în intrebari.js!`);
                return; 
            }

            chestionarCurent = mixTest;
            chestionarCurent.sort(() => Math.random() - 0.5); 
            scorMaximPosibil = totalPuncte; 
            salveazaExamenInIstoric(chestionarCurent, scorMaximPosibil, 0);
            initiazaTestul();
        }

        function pornesteChestionarSalvat(intrebariSalvate, plafonSalvat) {
            modCurent = 'examen';
            chestionarCurent = intrebariSalvate;
            scorMaximPosibil = plafonSalvat || chestionarCurent.reduce((t, i) => t + (i.puncte || 1), 0);
            initiazaTestul();
        }

        function initiazaTestul() {
            indexIntrebare = 0;
            scorAcumulat = 0;
            raspunsuriGresite = [];
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("rezultate").style.display = "none";
            document.getElementById("quiz-container").style.display = "block";
            incarcaIntrebare();
        }

        function incarcaIntrebare() {
            if (indexIntrebare >= chestionarCurent.length) {
                afiseazaRezultate();
                return;
            }

            optiuniSelectateAcum = []; 
            const intrebareCurenta = chestionarCurent[indexIntrebare];
            const punctajIntrebare = intrebareCurenta.puncte || 1; 
            
            document.getElementById("progres-text").innerText = `Întrebarea ${indexIntrebare + 1} din ${chestionarCurent.length}`;
            document.getElementById("categorie-text").innerText = `Din categoria: ${intrebareCurenta.sursa}`;
            
            const textId = intrebareCurenta.id ? `[ID: ${intrebareCurenta.id}] ` : "";
            document.getElementById("titlu-intrebare").innerText = textId + intrebareCurenta.intrebare;
            document.getElementById("puncte-intrebare").innerHTML = `<span class="puncte-info">Valoare întrebare: ${punctajIntrebare} puncte</span>`;
            
            const elementOptiuni = document.getElementById("optiuni-container");
            elementOptiuni.innerHTML = "";
            
            document.getElementById("btn-confirma").style.display = "none";

            // Controlăm butonul "Răspunde mai târziu" (Nu are sens în modul de învățare sau la ultima întrebare)
            if (modCurent === 'invatare' || indexIntrebare === chestionarCurent.length - 1) {
                document.getElementById("btn-mai-tarziu").style.display = "none";
            } else {
                document.getElementById("btn-mai-tarziu").style.display = "block";
            }

            let optiuniAmestecate = [...intrebareCurenta.optiuni];
            optiuniAmestecate.sort(() => Math.random() - 0.5);

            optiuniAmestecate.forEach(optiune => {
                const buton = document.createElement("button");
                buton.innerText = optiune;
                buton.className = "btn-optiune";
                buton.onclick = () => toggleSelectie(buton, optiune);
                elementOptiuni.appendChild(buton);
            });
        }

        function toggleSelectie(buton, optiuneText) {
            if (buton.disabled) return; 
            
            if (optiuniSelectateAcum.includes(optiuneText)) {
                optiuniSelectateAcum = optiuniSelectateAcum.filter(opt => opt !== optiuneText);
                buton.classList.remove("btn-selectat");
            } else {
                optiuniSelectateAcum.push(optiuneText);
                buton.classList.add("btn-selectat");
            }

            if (optiuniSelectateAcum.length > 0) {
                document.getElementById("btn-confirma").style.display = "block";
            } else {
                document.getElementById("btn-confirma").style.display = "none";
            }
        }

        // --- RĂSPUNDE MAI TÂRZIU ---
        function raspundeMaiTarziu() {
            if (indexIntrebare === chestionarCurent.length - 1) return;
            
            // Tăiem întrebarea curentă din listă și o împingem la coadă
            let intrebareAmanata = chestionarCurent.splice(indexIntrebare, 1)[0];
            chestionarCurent.push(intrebareAmanata);
            
            // Nu incrementăm indexul, deoarece elementele s-au rearanjat
            incarcaIntrebare();
        }

        function verificaRaspuns() {
            const intrebareCurenta = chestionarCurent[indexIntrebare];
            const toateButoanele = document.querySelectorAll(".btn-optiune");
            const btnConfirma = document.getElementById("btn-confirma");
            
            document.getElementById("btn-mai-tarziu").style.display = "none"; // Ascunde în timpul verificării

            toateButoanele.forEach(btn => btn.disabled = true);
            btnConfirma.style.display = "none"; 

            let litereCorecte = Array.isArray(intrebareCurenta.raspunsCorect) 
                                ? intrebareCurenta.raspunsCorect 
                                : [intrebareCurenta.raspunsCorect];
            
            const literaSpreIndex = { 'A': 0, 'B': 1, 'C': 2, 'D': 3, 'E': 4, 'a': 0, 'b': 1, 'c': 2, 'd': 3, 'e': 4 };
            
            let texteCorecteReale = litereCorecte.map(litera => {
                let index = literaSpreIndex[litera];
                return intrebareCurenta.optiuni[index];
            });

            let selectateSortate = [...optiuniSelectateAcum].sort();
            let corecteSortate = [...texteCorecteReale].sort();
            
            let esteCorectTotal = JSON.stringify(selectateSortate) === JSON.stringify(corecteSortate);
            const puncteCastigate = intrebareCurenta.puncte || 1;

            toateButoanele.forEach(btn => {
                let textButon = btn.innerText;
                let tuAiBifat = optiuniSelectateAcum.includes(textButon);
                let eraCorectSaBifezi = texteCorecteReale.includes(textButon);

                btn.classList.remove("btn-selectat");

                if (eraCorectSaBifezi && tuAiBifat) {
                    btn.classList.add("btn-corect"); 
                } else if (eraCorectSaBifezi && !tuAiBifat) {
                    btn.classList.add("btn-partial"); 
                } else if (!eraCorectSaBifezi && tuAiBifat) {
                    btn.classList.add("btn-gresit"); 
                }
            });

            if (esteCorectTotal) {
                scorAcumulat += puncteCastigate; 
            } else {
                let raspunsuriTaleGresiteFormatate = optiuniSelectateAcum.length > 0 ? optiuniSelectateAcum.join(" + ") : "Nimic";
                let raspunsuriCorecteFormatate = texteCorecteReale.join(" + ");

                raspunsuriGresite.push({
                    id: intrebareCurenta.id || "N/A",
                    intrebare: intrebareCurenta.intrebare,
                    sursa: intrebareCurenta.sursa,
                    punctePierdute: puncteCastigate, 
                    raspunsulTau: raspunsuriTaleGresiteFormatate,
                    raspunsulCorect: raspunsuriCorecteFormatate
                });
            }

            // Timp de așteptare: Dacă e corect trecem mai repede. Dacă e modul învățare lăsăm mai mult timp să citească greșeala.
            let delay = esteCorectTotal ? 800 : (modCurent === 'invatare' ? 2500 : 1500);

            setTimeout(() => {
                indexIntrebare++;
                
                // Salvăm progresul de învățare înainte să trecem mai departe
                if (modCurent === 'invatare') {
                    localStorage.setItem('invatare_' + categorieCurenta, indexIntrebare);
                }
                
                incarcaIntrebare();
            }, delay); 
        }

        function afiseazaRezultate() {
            document.getElementById("quiz-container").style.display = "none";
            const divRezultate = document.getElementById("rezultate");
            divRezultate.style.display = "block";

            // AFIȘARE PENTRU MODUL DE ÎNVĂȚARE
            if (modCurent === 'invatare') {
                localStorage.setItem('invatare_' + categorieCurenta, 0); // Resetează progresul categoriei
                genereazaButoaneInvatare(); // Reface statusul UI în fundal

                let html = `<h2 style="text-align:center; color:#17a2b8;">Învățare Finalizată: ${categorieCurenta}</h2>`;
                html += `<p style="text-align:center; font-size:18px;">Ai parcurs cu succes toate cele ${chestionarCurent.length} de întrebări din această categorie!</p>`;
                
                if (raspunsuriGresite.length > 0) {
                    html += `<h3>Pe parcurs ai greșit la ${raspunsuriGresite.length} întrebări:</h3>`;
                    raspunsuriGresite.forEach(greseala => {
                        html += `<div class="greseala-box">
                                    <span style="font-size: 11px; font-weight: bold; color: #ff9900;">[ID: ${greseala.id}]</span>
                                    <p style="margin: 5px 0 10px 0;"><strong>${greseala.intrebare}</strong></p>
                                    <p style="margin: 0; font-size:14px;">Ai ales: <span class="gresit-text">${greseala.raspunsulTau}</span></p>
                                    <p style="margin: 0; font-size:14px;">Corect era: <span class="corect-text">${greseala.raspunsulCorect}</span></p>
                                </div>`;
                    });
                }
                html += `<button class="btn-start" style="margin-top:30px;" onclick="location.reload()">Înapoi la Meniu Principal</button>`;
                divRezultate.innerHTML = html;
                return;
            }

            // AFIȘARE PENTRU MODUL EXAMEN (Rămâne neschimbată logic)
            let totalPuncteBrute = chestionarCurent.reduce((t, i) => t + (i.puncte || 1), 0);
            let punctajCalculatDin150 = Math.round((scorAcumulat / totalPuncteBrute) * scorMaximPosibil);
            
            let istoric = JSON.parse(localStorage.getItem("istoricExamene")) || [];
            if(istoric.length > 0) {
                istoric[0].scorObtinut = punctajCalculatDin150; 
                localStorage.setItem("istoricExamene", JSON.stringify(istoric));
            }

            let html = `<h2 style="text-align:center; color:#0056b3;">Examen Finalizat</h2>`;
            html += `<div style="background:#e9f7ff; padding:20px; border-radius:10px; text-align:center; margin-bottom:20px;">
                        <span style="font-size:16px; color:#555;">Punctajul tău obținut:</span><br>
                        <strong style="font-size:36px; color:#007bff;">${punctajCalculatDin150} / ${scorMaximPosibil}</strong> puncte
                     </div>`;

            if (raspunsuriGresite.length > 0) {
                html += `<h3>Atenție! Ai greșit la ${raspunsuriGresite.length} întrebări:</h3>`;
                raspunsuriGresite.forEach(greseala => {
                    html += `<div class="greseala-box">
                                <span style="font-size: 11px; font-weight: bold; color: #ff9900;">[${greseala.sursa}] [ID: ${greseala.id}] (-${greseala.punctePierdute} pct.)</span>
                                <p style="margin: 5px 0 10px 0;"><strong>${greseala.intrebare}</strong></p>
                                <p style="margin: 0; font-size:14px;">Tu ai ales: <span class="gresit-text">${greseala.raspunsulTau}</span></p>
                                <p style="margin: 0; font-size:14px;">Corect era: <span class="corect-text">${greseala.raspunsulCorect}</span></p>
                            </div>`;
                });
            } else {
                html += `<p class="corect-text" style="text-align:center; font-size: 20px;">Admis cu punctaj maxim! Felicitări!</p>`;
            }

            html += `<button class="btn-start" style="margin-top:30px;" onclick="location.reload()">Generează alt chestionar</button>`;
            html += `<button class="btn-secundar" onclick="initiazaTestul()">Repetă chestionarul greșit</button>`;
            
            divRezultate.innerHTML = html;
        }
    </script>
</body>
</html>
